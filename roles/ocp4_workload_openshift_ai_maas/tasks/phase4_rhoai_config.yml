---
- name: Patch DataScienceCluster to enable MaaS
  kubernetes.core.k8s:
    state: present
    merge_type: merge
    definition:
      apiVersion: datasciencecluster.opendatahub.io/v2
      kind: DataScienceCluster
      metadata:
        name: default-dsc
      spec:
        components:
          kserve:
            modelsAsService:
              managementState: Managed

- name: Patch OdhDashboardConfig for MaaS
  kubernetes.core.k8s:
    state: present
    merge_type: merge
    definition:
      apiVersion: opendatahub.io/v1alpha
      kind: OdhDashboardConfig
      metadata:
        name: odh-dashboard-config
        namespace: redhat-ods-applications
      spec:
        dashboardConfig:
          modelAsService: true
          maasAuthPolicies: true

- name: Wait for DSC KserveReady
  kubernetes.core.k8s_info:
    api_version: datasciencecluster.opendatahub.io/v2
    kind: DataScienceCluster
    name: default-dsc
  register: r_dsc
  until:
    - r_dsc.resources | length > 0
    - r_dsc.resources[0].status.conditions is defined
    - r_dsc.resources[0].status.conditions | selectattr('type', 'equalto', 'KserveReady') | selectattr('status', 'equalto', 'True') | list | length > 0
    - r_dsc.resources[0].status.conditions | selectattr('type', 'equalto', 'ModelControllerReady') | selectattr('status', 'equalto', 'True') | list | length > 0
  retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
  delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

- name: Wait for MaaSModelRef CRD to exist
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: maasmodelrefs.maas.opendatahub.io
  register: r_maas_crd
  until:
    - r_maas_crd.resources | length > 0
  retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
  delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

- name: Wait for maas-api Deployment rollout
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: maas-api
    namespace: redhat-ods-applications
  register: r_maas_api
  until:
    - r_maas_api.resources | length > 0
    - r_maas_api.resources[0].status.readyReplicas is defined
    - r_maas_api.resources[0].status.readyReplicas >= 1
  retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
  delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

- name: Wait for default-tenant Ready
  kubernetes.core.k8s_info:
    api_version: maas.opendatahub.io/v1alpha1
    kind: Tenant
    name: default-tenant
    namespace: models-as-a-service
  register: r_tenant
  until:
    - r_tenant.resources | length > 0
    - r_tenant.resources[0].status is defined
    - r_tenant.resources[0].status.conditions is defined
    - r_tenant.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0
  retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
  delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

- name: Verify MaaS API health endpoint
  ansible.builtin.uri:
    url: "https://maas.{{ _ocp4_workload_openshift_ai_maas_cluster_domain }}/maas-api/health"
    validate_certs: false
    status_code: 200
  register: r_health
  until: r_health.status == 200
  retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
  delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"
