---
# -------------------------------------------------------
# cert-manager operator (idempotent, Automatic approval)
# -------------------------------------------------------
- name: Check for existing cert-manager Subscription
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: openshift-cert-manager-operator
    namespace: cert-manager-operator
  register: r_certmgr_sub

- name: Install cert-manager operator
  when: r_certmgr_sub.resources | length == 0
  block:
    - name: Create cert-manager namespace
      kubernetes.core.k8s:
        state: present
        template: namespace-cert-manager.yaml.j2

    - name: Create cert-manager OperatorGroup
      kubernetes.core.k8s:
        state: present
        template: operatorgroup-cert-manager.yaml.j2

    - name: Create cert-manager Subscription
      kubernetes.core.k8s:
        state: present
        template: subscription-cert-manager.yaml.j2

    - name: Wait for cert-manager CSV Succeeded
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: cert-manager-operator
      register: r_certmgr_csv
      until:
        - r_certmgr_csv.resources | selectattr('metadata.name', 'match', 'cert-manager') | selectattr('status.phase', 'equalto', 'Succeeded') | list | length > 0
      retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
      delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

# -------------------------------------------------------
# LeaderWorkerSet operator (idempotent, Automatic approval)
# -------------------------------------------------------
- name: Check for existing LWS Subscription
