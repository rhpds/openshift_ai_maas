      delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

# -------------------------------------------------------
# Kuadrant / RHCL operator (idempotent, Manual approval)
# -------------------------------------------------------
- name: Check for existing Kuadrant Subscription
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: rhcl-operator
    namespace: openshift-operators
  register: r_kuadrant_sub

- name: Install Kuadrant operator
  when: r_kuadrant_sub.resources | length == 0
  block:
    - name: Create Kuadrant Subscription (Manual approval)
      kubernetes.core.k8s:
        state: present
        template: subscription-kuadrant.yaml.j2

    - name: Wait for Kuadrant InstallPlan to appear
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: InstallPlan
        namespace: openshift-operators
      register: r_kuadrant_ip
      until:
        - r_kuadrant_ip.resources | selectattr('spec.approved', 'equalto', false) | selectattr('spec.clusterServiceVersionNames', 'search', 'rhcl-operator') | list | length > 0
      retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
      delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

    - name: Approve Kuadrant InstallPlan
      kubernetes.core.k8s:
        state: present
        api_version: operators.coreos.com/v1alpha1
        kind: InstallPlan
        name: "{{ item.metadata.name }}"
        namespace: openshift-operators
        definition:
          spec:
            approved: true
      loop: >-
        {{ r_kuadrant_ip.resources | selectattr('spec.approved', 'equalto', false) | selectattr('spec.clusterServiceVersionNames', 'search', 'rhcl-operator') | list }}

    - name: Wait for Kuadrant CSV Succeeded
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: openshift-operators
      register: r_kuadrant_csv
      until:
        - r_kuadrant_csv.resources | selectattr('metadata.name', 'match', 'rhcl-operator') | selectattr('status.phase', 'equalto', 'Succeeded') | list | length > 0
      retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
      delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

    - name: Wait for Authorino operator CSV Succeeded
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: openshift-operators
      register: r_authorino_csv
      until:
        - r_authorino_csv.resources | selectattr('metadata.name', 'match', 'authorino-operator') | selectattr('status.phase', 'equalto', 'Succeeded') | list | length > 0
      retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
      delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"

    - name: Wait for Limitador operator CSV Succeeded
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: openshift-operators
      register: r_limitador_csv
      until:
        - r_limitador_csv.resources | selectattr('metadata.name', 'match', 'limitador-operator') | selectattr('status.phase', 'equalto', 'Succeeded') | list | length > 0
      retries: "{{ ocp4_workload_openshift_ai_maas_wait_retries }}"
      delay: "{{ ocp4_workload_openshift_ai_maas_wait_delay }}"
