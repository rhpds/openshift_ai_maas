  register: r_lws_sub

- name: Install LWS operator
  when: r_lws_sub.resources | length == 0
  block:
    - name: Create LWS namespace
      kubernetes.core.k8s:
        state: present
        template: namespace-lws.yaml.j2

    - name: Create LWS OperatorGroup
      kubernetes.core.k8s:
        state: present
        template: operatorgroup-lws.yaml.j2

    - name: Create LWS Subscription
      kubernetes.core.k8s:
        state: present
        template: subscription-lws.yaml.j2

    - name: Wait for LWS CSV Succeeded
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: openshift-lws-operator
      register: r_lws_csv
      until:
