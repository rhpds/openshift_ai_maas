---
- name: Get cluster ingress domain
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Ingress
    name: cluster
  register: r_ingress

- name: Set cluster domain fact
  ansible.builtin.set_fact:
    _ocp4_workload_openshift_ai_maas_cluster_domain: >-
      {{ r_ingress.resources[0].spec.domain }}

# -------------------------------------------------------
# Phase 6: Remove external models
# -------------------------------------------------------
- name: Delete external-models namespace
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: external-models
  ignore_errors: true

- name: Delete external model governance CRs
  kubernetes.core.k8s:
    state: absent
    api_version: maas.opendatahub.io/v1alpha1
    kind: "{{ item.1.kind }}"
    name: "{{ item.0.name }}-{{ item.1.suffix }}"
    namespace: models-as-a-service
  with_nested:
    - "{{ ocp4_workload_openshift_ai_maas_external_models }}"
    - - { kind: MaaSAuthPolicy, suffix: access }
      - { kind: MaaSSubscription, suffix: default }
  loop_control:
    label: "{{ item.0.name }}-{{ item.1.suffix }}"
  ignore_errors: true

# -------------------------------------------------------
# Phase 5: Remove simulator
# -------------------------------------------------------
- name: Delete simulator governance CRs
  kubernetes.core.k8s:
    state: absent
    api_version: maas.opendatahub.io/v1alpha1
    kind: "{{ item.kind }}"
    name: "{{ item.name }}"
    namespace: "{{ item.namespace }}"
  loop:
    - { kind: MaaSSubscription, name: simulator-default, namespace: models-as-a-service }
    - { kind: MaaSAuthPolicy, name: simulator-access, namespace: models-as-a-service }
    - { kind: MaaSModelRef, name: simulated, namespace: llm }
  ignore_errors: true

- name: Delete simulator LLMInferenceService
  kubernetes.core.k8s:
    state: absent
    api_version: serving.kserve.io/v1alpha1
    kind: LLMInferenceService
    name: simulated
    namespace: llm
  ignore_errors: true

- name: Delete llm namespace
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: llm
  ignore_errors: true

# -------------------------------------------------------
# Phase 4: Revert RHOAI MaaS config
# -------------------------------------------------------
- name: Patch DSC to disable MaaS
  kubernetes.core.k8s:
    state: present
    merge_type: merge
    definition:
      apiVersion: datasciencecluster.opendatahub.io/v2
      kind: DataScienceCluster
      metadata:
        name: default-dsc
      spec:
        components:
          kserve:
            modelsAsService:
              managementState: Removed
  ignore_errors: true

- name: Patch OdhDashboardConfig to disable MaaS
  kubernetes.core.k8s:
    state: present
    merge_type: merge
    definition:
      apiVersion: opendatahub.io/v1alpha
      kind: OdhDashboardConfig
      metadata:
        name: odh-dashboard-config
        namespace: redhat-ods-applications
      spec:
        dashboardConfig:
          modelAsService: false
          maasAuthPolicies: false
  ignore_errors: true

# -------------------------------------------------------
# Phase 3: Remove PostgreSQL
# -------------------------------------------------------
- name: Delete PostgreSQL resources
  kubernetes.core.k8s:
    state: absent
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    name: "{{ item.name }}"
    namespace: redhat-ods-applications
  loop:
    - { api_version: apps/v1, kind: Deployment, name: postgres }
    - { api_version: v1, kind: Service, name: postgres }
    - { api_version: v1, kind: PersistentVolumeClaim, name: postgres-data }
    - { api_version: v1, kind: Secret, name: maas-db-config }
    - { api_version: v1, kind: Secret, name: postgres-creds }
  ignore_errors: true

# -------------------------------------------------------
# Phase 2: Remove gateway infrastructure
# -------------------------------------------------------
- name: Delete BBR workaround EnvoyFilter
  kubernetes.core.k8s:
    state: absent
    api_version: networking.istio.io/v1alpha3
    kind: EnvoyFilter
    name: fix-bbr-ext-proc-match
    namespace: openshift-ingress
  ignore_errors: true

- name: Delete gateway resources
  kubernetes.core.k8s:
    state: absent
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    name: "{{ item.name }}"
    namespace: "{{ item.namespace | default(omit) }}"
  loop:
    - { api_version: route.openshift.io/v1, kind: Route, name: maas-default-gateway-https, namespace: openshift-ingress }
    - { api_version: gateway.networking.k8s.io/v1, kind: Gateway, name: maas-default-gateway, namespace: openshift-ingress }
    - { api_version: v1, kind: ConfigMap, name: maas-gateway-options, namespace: openshift-ingress }
    - { api_version: gateway.networking.k8s.io/v1, kind: GatewayClass, name: openshift-default }
  ignore_errors: true

- name: Delete Kuadrant CR
  kubernetes.core.k8s:
    state: absent
    api_version: kuadrant.io/v1beta1
    kind: Kuadrant
    name: kuadrant
    namespace: kuadrant-system
  ignore_errors: true

# -------------------------------------------------------
# Restore control-plane NoSchedule taints
# -------------------------------------------------------
- name: Restore control-plane nodes to non-schedulable
  kubernetes.core.k8s:
    state: present
    merge_type: merge
    definition:
      apiVersion: config.openshift.io/v1
      kind: Scheduler
      metadata:
        name: cluster
      spec:
        mastersSchedulable: false
  ignore_errors: true
