---
# -- Phase 1: Operators --
ocp4_workload_openshift_ai_maas_install_operators: true

# Kuadrant / Red Hat Connectivity Link
ocp4_workload_openshift_ai_maas_kuadrant_channel: stable
ocp4_workload_openshift_ai_maas_kuadrant_starting_csv: ""

# cert-manager
ocp4_workload_openshift_ai_maas_certmanager_channel: stable-v1

# LeaderWorkerSet
ocp4_workload_openshift_ai_maas_lws_channel: stable-v1.0

# -- Phase 2: Platform --
ocp4_workload_openshift_ai_maas_gateway_memory_limit: 2Gi

# -- Phase 3: PostgreSQL --
ocp4_workload_openshift_ai_maas_postgres_image: registry.redhat.io/rhel9/postgresql-16:latest
ocp4_workload_openshift_ai_maas_postgres_storage: 10Gi
ocp4_workload_openshift_ai_maas_postgres_user: maas
ocp4_workload_openshift_ai_maas_postgres_db: maas

# -- Phase 4: RHOAI MaaS config --
ocp4_workload_openshift_ai_maas_wait_retries: 60
ocp4_workload_openshift_ai_maas_wait_delay: 10

# -- Phase 5: Simulator --
ocp4_workload_openshift_ai_maas_deploy_simulator: true
ocp4_workload_openshift_ai_maas_simulator_image: ghcr.io/llm-d/llm-d-inference-sim:v0.7.1
ocp4_workload_openshift_ai_maas_simulator_model: facebook/opt-125m

# -- Phase 6: External Models --
ocp4_workload_openshift_ai_maas_external_models: []
# Example:
# - name: gpt-4o
#   provider: openai
#   target_model: gpt-4o
#   endpoint: api.openai.com
#   api_key: sk-...
